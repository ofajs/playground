<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ofa playground</title>
    <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/dist/ofa.min.js#debug"></script>
    <link
      rel="stylesheet"
      href="https://core.noneos.com/nos-tool/css/palette.css"
    />
    <link
      rel="stylesheet"
      href="https://core.noneos.com/nos-tool/css/theme.css"
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(
          135deg,
          var(--md-sys-color-surface-container-low) 0%,
          var(--md-sys-color-surface-container) 100%
        );
        padding: 24px;
        box-sizing: border-box;
      }

      .page-header {
        text-align: center;
        margin-bottom: 32px;
      }

      .page-header h1 {
        margin: 0 0 8px 0;
        font-size: 32px;
        font-weight: 500;
        color: var(--md-sys-color-on-surface);
      }

      .page-header p {
        margin: 0;
        color: var(--md-sys-color-on-surface-variant);
        font-size: 14px;
      }

      o-page {
        width: 100%;
        max-width: 800px;
      }

      .main-content {
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .main-content.visible {
        opacity: 1;
      }

      .loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        text-align: center;
      }

      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--md-sys-color-surface-container-high);
        border-top-color: var(--md-sys-color-primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <p style="color: var(--md-sys-color-on-surface-variant); margin: 0">
      Loading...
    </p>
  </div>
  <div class="main-content" id="mainContent">
    <div class="page-header">
      <h1>🚀 OFA Playground</h1>
      <p>
        <locale-text>
          <span lang="cn">最佳 ofa.js 项目 demo 分享工具</span>
          <span lang="en">Best ofa.js project demo sharing tool</span>
        </locale-text>
      </p>
    </div>
    <o-page src="/comps/o-code/top-bar/project-form.html"></o-page>
  </div>
  <nos-version auto-install></nos-version>
  <body>
    <script type="module">
      const load = lm(import.meta);

      $("nos-version").on("installed", () => {
        document.getElementById("loading").style.display = "none";
        document.getElementById("mainContent").classList.add("visible");

        const params = new URLSearchParams(location.search);
        const redirect = params.get("redirect");
        if (redirect === "w") {
          const data = params.get("d");
          if (!data) {
            return;
          }

          location.href = `./code/w.html?d=${data}`;
        }
      });

      await load("https://core.noneos.com/nos-tool/comps/nos-version.html");
    </script>
  </body>
</html>
