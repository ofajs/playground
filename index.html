<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ofa playground</title>
    <script src="https://cdn.jsdelivr.net/gh/kirakiray/ofa.js/dist/ofa.min.js#debug"></script>
    <link
      rel="stylesheet"
      href="https://core.noneos.com/nos-tool/css/palette.css"
    />
    <link
      rel="stylesheet"
      href="https://core.noneos.com/nos-tool/css/theme.css"
    />
  </head>
  <nos-version auto-install></nos-version>
  <ul>
    <li>
      <a href="/nos-tool/file-explore/">File Explore</a>：查看虚拟文件系统
    </li>
  </ul>
  <body>
    <script type="module">
      const load = lm(import.meta);

      $("nos-version").on("installed", () => {
        // 判断并重定向
        const params = new URLSearchParams(location.search);
        const redirect = params.get("redirect");
        if (redirect === "w") {
          const data = params.get("d");
          if (!data) {
            return;
          }

          location.href = `./code/w.html?d=${data}`;
        }
      });

      await load("https://core.noneos.com/nos-tool/comps/nos-version.html");
    </script>
  </body>
</html>
