<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/menu/menu.html"></l-m>
  <style>
    :host {
      display: block;
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 30;
      pointer-events: none;
    }

    .main-menu {
      position: absolute;
      left: 0;
      top: 0;
      pointer-events: auto;
      z-index: 32;
    }
    .main-menu[open="off"] {
      pointer-events: none;
    }

    .mask {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 31;
      pointer-events: auto;
    }
    .hide {
      display: none;
    }
    p-menu-item n-icon {
      color: var(--md-sys-color-primary);
    }
  </style>
  <div class="mask" on:click="openMenu = false" class:hide="!openMenu"></div>
  <!-- 专门用于处理菜单的 -->
  <o-consumer name="o-code" on:open-file-menu="openFileMenu"></o-consumer>
  <p-menu class="main-menu" attr:open="openMenu ? 'on' : 'off'">
    <!-- <p-menu-item>
      <n-icon icon="lets-icons:view" slot="prefix"></n-icon>
      预览
    </p-menu-item> -->
    <p-menu-item on:click="openFile">
      <n-icon icon="majesticons:open-line" slot="prefix"></n-icon>
      外部打开
    </p-menu-item>
    <hr />
    <p-menu-item>
      <n-icon icon="iconamoon:file-add" slot="prefix"></n-icon>
      创建文件
    </p-menu-item>
    <p-menu-item>
      <n-icon
        icon="material-symbols:create-new-folder-outline"
        slot="prefix"
      ></n-icon>
      创建目录
    </p-menu-item>
    <p-menu-item>
      <n-icon icon="boxicons:rename" slot="prefix"></n-icon>
      重命名
    </p-menu-item>
    <hr />
    <p-menu-item on:click="cutFile">
      <n-icon icon="boxicons:cut" slot="prefix"></n-icon>
      剪切
    </p-menu-item>
    <p-menu-item on:click="copyFile">
      <n-icon icon="boxicons:copy" slot="prefix"></n-icon>
      复制
    </p-menu-item>
    <p-menu-item attr:disabled="!inCut && !inCopy" on:click="pasteFile">
      <n-icon icon="boxicons:paste" slot="prefix"></n-icon>
      粘贴
    </p-menu-item>
    <hr />
    <p-menu-item on:click="deleteFile">
      <n-icon icon="material-symbols:delete-outline" slot="prefix"></n-icon>
      删除
    </p-menu-item>
  </p-menu>
  <script>
    export default async ({ load }) => {
      const { get } = await load("/nos/fs/main.js");
      const { toast, confirm } = await load(
        "/gh/ofajs/Punch-UI/packages/util.js",
      );

      return {
        data: {
          openMenu: false,
          path: null,
          inCut: "", // 等待剪切文件或目录
          inCopy: "", // 等待复制文件或目录
        },
        proto: {
          cutFile() {
            this.inCut = this.path;
            this.inCopy = "";
            this.openMenu = false;
          },
          copyFile() {
            this.inCut = "";
            this.inCopy = this.path;
            this.openMenu = false;
          },
          async pasteFile() {
            let targetDirHandle = await get(this.path);

            if (targetDirHandle.kind === "file") {
              targetDirHandle = targetDirHandle.parent;
            }

            const handle = await get(this.inCut || this.inCopy);

            // 查看是否有同名文件或目录
            const equalNameFile = await targetDirHandle.get(handle.name);
            if (equalNameFile) {
              toast({
                color: "error",
                content: "目标目录下已存在相同名称文件或目录",
              });
              return;
            }

            this.openMenu = false;

            if (this.inCut) {
              // 粘贴操作
              await handle.moveTo(targetDirHandle);
            } else if (this.inCopy) {
              // 粘贴操作
              await handle.copyTo(targetDirHandle);
            }

            this.inCut = "";
            this.inCopy = "";

            // 出发刷新列表
            const provider = this.getProvider("o-code");

            provider.dispatch("refresh-list", {
              data: {
                path: targetDirHandle.path,
                fromPath: handle.parent.path,
              },
            });
          },
          openFile() {
            if (this.path) {
              window.open(`/$${this.path}`);
            }
            this.openMenu = false;
          },
          openFileMenu(e) {
            const { path, kind, clientX, clientY } = e.data;

            this.path = path;

            const menu = this.shadow.$(".main-menu");

            this.openMenu = true;

            menu.style.left = `${clientX}px`;
            menu.style.top = `${clientY}px`;
          },
          async deleteFile() {
            this.openMenu = false;

            const result = await confirm({
              title: "删除确认",
              content: `确定删除 ${this.path} 吗？该操作不可撤销`,
            });

            if (!result) {
              return;
            }

            const handle = await get(this.path);

            await handle.remove();
          },
        },
      };
    };
  </script>
</template>
