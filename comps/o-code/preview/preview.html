<template page>
  <style>
    :host {
      display: block;
      height: 100%;
      background-color: var(--md-sys-color-surface);
    }
    .preview {
      display: flex;
      flex-direction: column;
      height: 100%;
      border: 1px solid rgba(from var(--md-sys-color-normal) r g b / 0.3);
      border-radius: 8px 0 0 0;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      align-items: center;
      height: 40px;
      background: var(--md-sys-color-normal-container);
      border-bottom: 1px solid rgba(from var(--md-sys-color-normal) r g b / 0.3);
      padding: 0 8px;
      gap: 8px;
    }
    .window-controls {
      display: flex;
      gap: 6px;
      padding-right: 8px;
      border-right: 1px solid rgba(from var(--md-sys-color-normal) r g b / 0.3);
      margin-right: 8px;
    }
    .control {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .control.close {
      background-color: #ff5f56;
    }
    .control.minimize {
      background-color: #ffbd2e;
    }
    .control.maximize {
      background-color: #27ca3f;
    }
    .url-bar {
      flex: 1;
      display: flex;
      align-items: center;
      height: 28px;
      background-color: var(--md-sys-color-surface);
      border: 1px solid rgba(from var(--md-sys-color-normal) r g b / 0.3);
      border-radius: 18px;
      padding: 0 12px;
      font-size: 12px;
      color: var(--md-sys-color-on-surface);
    }
    .url-bar input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 12px;
      color: var(--md-sys-color-on-surface);
    }
    .refresh-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      cursor: pointer;
      border-radius: 4px;
    }
    .refresh-btn:hover {
      background-color: rgba(from var(--md-sys-color-on-surface) r g b / 0.08);
    }
    .iframe-container {
      flex: 1;
      background-color: var(--md-sys-color-surface);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background-color: #fff;
    }
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(from var(--md-sys-color-on-surface) r g b / 0.6);
      font-size: 14px;
    }
  </style>

  <div class="preview">
    <div class="topbar">
      <div class="window-controls">
        <div class="control close"></div>
        <div class="control minimize"></div>
        <div class="control maximize"></div>
      </div>
      <div class="url-bar">
        <input
          type="text"
          :value="selectedPath"
          placeholder="输入网址..."
          readonly
        />
        <div class="web-selector">
          <o-fill :value="list">
            <div class="web-option" on:click="$host.selectOpt($data)">
              {{$data.path}}
            </div>
          </o-fill>
        </div>
      </div>
      <div class="refresh-btn">
        <n-icon icon="material-symbols:refresh" size="18"></n-icon>
      </div>
    </div>
    <div class="iframe-container">
      <o-if :value="selectUrl">
        <iframe attr:src="selectUrl"></iframe>
      </o-if>
      <o-else>
        <div class="empty-state">
          <n-icon icon="material-symbols:preview" size="48"></n-icon>
          <div style="margin-top: 12px">暂无预览内容</div>
        </div>
      </o-else>
    </div>
  </div>
  <o-consumer
    name="o-code"
    watch:project-handle-path="projectPath"
  ></o-consumer>
  <script>
    export default async ({ load }) => {
      const { get } = await load("/nos/fs/main.js");

      return {
        data: {
          selectUrl: "",
          selectedPath: "",
          list: [],
          projectPath: "",
        },
        watch: {
          projectPath(path) {
            if (!path) {
              return;
            }

            this.loadProject(path);
          },
        },
        proto: {
          selectOpt(item) {
            this.selectUrl = item.url;
            this.selectedPath = item.path;
          },
          async loadProject(path) {
            const handle = await get(path);

            let list = await searchHtml(handle);

            list = list.map((path) => {
              return {
                path,
                url: `/$${path}`,
              };
            });

            this.list = list;

            if (this.list.length > 0) {
              // 默认先看第一个
              this.selectUrl = this.list[0].url;
              this.selectedPath = this.list[0].path;
            }
          },
        },
      };
    };

    // 查找符合规则的html文件
    const searchHtml = async (dirHandle) => {
      const list = [];

      for await (let handle of dirHandle.values()) {
        if (handle.name.endsWith(".html")) {
          // 查看内容是否html开头
          const content = await handle.text();

          if (content.startsWith("<template ")) {
            // 忽略组件或页面模块
            continue;
          }

          list.push(handle.path);
        } else if (handle.kind === "dir") {
          list.push(...(await searchHtml(handle)));
        }
      }

      return list;
    };
  </script>
</template>
