<template component>
  <style>
    :host {
      display: block;
      width: 100%;
      height: 100%;
      background-color: var(--md-sys-color-on-normal);
      user-select: none;
    }

    .container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    .top {
      height: 40px;
    }
    .main {
      display: flex;
      width: 100%;
      flex: 1;
    }
    .left {
      position: relative;
      width: 250px;
      height: 100%;
      overflow: auto;
    }

    .overflow-inner {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
    }
    .article {
      display: flex;
      flex: 1;
      border-left: 1px solid gray;
      border-top: 1px solid gray;
      border-radius: 6px;
      overflow: hidden;
    }

    .code-area {
      display: flex;
      flex-direction: column;
      flex: 2;
      background-color: var(--md-sys-color-surface);
    }

    .preview-area {
      position: relative;
      flex: 0 0 calc(50vw - 400px);
    }

    .resize-line {
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 3px;
      cursor: ew-resize;
      z-index: 21;
    }

    .resize-line:hover {
      background-color: var(--md-sys-color-primary);
    }
    .resize-mask {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      /* background-color: rgba(0, 0, 0, 0.5); */
      z-index: 10;
      cursor: ew-resize;
    }
    .hide {
      display: none;
    }
    .hide-sidebar {
      width: 0 !important;
      opacity: 0;
      transition: all 0.3s ease-in-out;
    }
  </style>

  <div
    class="resize-mask"
    on:mousemove="resizeMove"
    on:mouseup="resizeEnd"
    class:hide="!showResizeMask"
  ></div>
  <o-provider
    name="o-code"
    sync:active-path="activePath"
    :project-handle-path="path"
    on:click-sidebar-btn="showSidebar = !showSidebar"
    on:click-preview-btn="showPreview = !showPreview"
  >
    <o-page src="./menu.html"></o-page>
    <div class="container">
      <div class="top">
        <o-page src="./top-bar/top-bar.html"></o-page>
      </div>
      <div class="main">
        <div class="left" class:hide-sidebar="!showSidebar">
          <div class="overflow-inner">
            <o-page src="./files/files.html"></o-page>
            <div
              class="resize-line"
              class:hide="showResizeMask"
              on:mousedown="resizeStart"
            ></div>
          </div>
        </div>
        <div class="article">
          <div class="code-area">
            <div class="code-top">
              <o-page src="./tabs.html"></o-page>
            </div>
            <o-page src="./code/code.html"></o-page>
          </div>
          <div class="preview-area" class:hide="!showPreview">
            <div class="overflow-inner">
              <o-page src="./preview/preview.html"></o-page>
              <div
                class="resize-line"
                class:hide="showResizeMask"
                on:mousedown="resizeStartPreview"
                style="left: 0; right: auto"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </o-provider>
  <script>
    export default async ({ load }) => {
      return {
        tag: "o-code",
        attrs: {
          path: null, // 项目地址
        },
        data: {
          showSidebar: true,
          showPreview:
            sessionStorage.getItem("showPreview") === "false" ? false : true,
          showResizeMask: false,
          activePath: sessionStorage.getItem("activePath") || "", // 激活路径
          resizeType: null, // 'sidebar' | 'preview' | null
        },
        watch: {
          activePath(activePath) {
            sessionStorage.setItem("activePath", activePath);
          },
          showPreview(showPreview) {
            sessionStorage.setItem("showPreview", showPreview);
          },
        },
        proto: {
          resizeStart(event) {
            this.resizeType = "sidebar";
            this.showResizeMask = true;

            this._startX = event.clientX;
            this._startWidth = parseInt(this.shadow.$(".left").css.width);
          },
          resizeStartPreview(event) {
            this.resizeType = "preview";
            this.showResizeMask = true;

            this._startX = event.clientX;
            this._startWidth = parseInt(
              this.shadow.$(".preview-area").css.width,
            );
          },
          resizeMove(event) {
            if (this.resizeType === "sidebar") {
              const diffX = event.clientX - this._startX;
              const finalWidth = this._startWidth + diffX;
              this.shadow.$(".left").style.width = `${finalWidth}px`;
              this.shadow.$(".left .overflow-inner").style.width =
                `${finalWidth}px`;
              clearTimeout(this._resizeTimeout);
              this._resizeTimeout = setTimeout(() => {
                localStorage.playgroundCodeWidth = finalWidth;
              }, 300);
            } else if (this.resizeType === "preview") {
              const diffX = event.clientX - this._startX;
              const finalWidth = this._startWidth - diffX;
              this.shadow.$(".preview-area").style.flex = `0 0 ${finalWidth}px`;
              clearTimeout(this._resizeTimeout);
              this._resizeTimeout = setTimeout(() => {
                localStorage.playgroundPreviewWidth = finalWidth;
              }, 300);
            }
          },
          resizeEnd(event) {
            this.showResizeMask = false;
            this.resizeType = null;
          },
        },
        attached() {
          if (localStorage.playgroundCodeWidth) {
            this.shadow.$(".left").style.width =
              `${localStorage.playgroundCodeWidth}px`;
            this.shadow.$(".left .overflow-inner").style.width =
              `${localStorage.playgroundCodeWidth}px`;
          }
          if (localStorage.playgroundPreviewWidth) {
            this.shadow.$(".preview-area").style.flex =
              `0 0 ${localStorage.playgroundPreviewWidth}px`;
          }
        },
      };
    };
  </script>
</template>
