<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/input/input.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/button/button.html"></l-m>
  <l-m src="/gh/ofajs/Punch-UI/packages/list/list.html"></l-m>
  <l-m src="/nos/n-icon/n-icon.html"></l-m>
  <l-m src="/nos/locale-text/locale-text.html"></l-m>
  <style>
    :host {
      display: block;
    }

    .container {
      border-radius: 16px;
      min-width: 50vw;
      overflow: auto;
      cursor: default;
    }

    h4 {
      margin: 16px 0 8px 0;
      color: var(--md-sys-color-primary);
      font-weight: 500;
    }

    h4:first-child {
      margin-top: 0;
    }

    p-list-item {
      border-radius: 30px;
      margin: 2px 0;
    }
    p-list-item[active-item] {
      background-color: var(--md-sys-color-primary-container);
    }

    .icon {
      font-size: 18px;
      margin-right: 8px;
      color: var(--md-sys-color-primary);
    }

    .temp-item {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--md-sys-color-outline);
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }
    .temp-item:hover {
      background-color: var(--md-sys-color-surface-container-high);
    }
    .temp-item.active {
      color: var(--md-sys-color-on-primary);
      background-color: var(--md-sys-color-primary);
      border-color: var(--md-sys-color-primary);
      cursor: default;
    }
  </style>

  <div class="container">
    <h4>
      <locale-text>
        <span lang="cn">创建项目</span>
        <span lang="en">Create Project</span>
      </locale-text>
    </h4>
    <div style="display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0">
      <o-fill :value="temps">
        <div
          class="temp-item"
          class:active="$host.tempIndex === $index"
          on:click="$host.tempIndex = $index"
        >
          {{$data.name}}
        </div>
      </o-fill>
    </div>
    <div style="padding: 8px 0 16px 0; display: flex; align-items: center">
      <p-input
        attr:disabled="creating"
        sync:value="newProjectName"
        style="flex: 1"
      >
        <label>
          <locale-text>
            <span lang="cn">输入新项目名称</span>
            <span lang="en">Enter new project name</span>
          </locale-text>
        </label>
      </p-input>
      <p-button
        attr:disabled="!newProjectName || creating"
        style="margin-left: 8px"
        on:click="createProject"
      >
        <n-icon icon="material-symbols:add-rounded" slot="prefix"></n-icon>
        <locale-text>
          <span lang="cn">确认创建</span>
          <span lang="en">Create</span>
        </locale-text>
      </p-button>
    </div>
    <o-if :value="canMount">
      <div style="padding-left: 4px">
        <p-button
          variant="outlined"
          on:click="mountLocalDir"
          attr:disabled="creating"
        >
          <n-icon icon="material-symbols:folder-open" slot="prefix"></n-icon>
          <locale-text>
            <span lang="cn">打开本地目录</span>
            <span lang="en">Open Local Directory</span>
          </locale-text>
        </p-button>
      </div>
    </o-if>
    <h4>
      <locale-text>
        <span lang="cn">已有的项目</span>
        <span lang="en">Existing Projects</span>
      </locale-text>
    </h4>
    <p-list style="max-height: 40vh; overflow-y: auto">
      <o-fill :value="list">
        <p-list-item
          attr:active-item="$host.projectPath === $data.path"
          button
          on:click="$host.selectOpt($data)"
        >
          <o-if :value="$data.isLocal" slot="prefix">
            <n-icon icon="material-symbols:folder-open" class="icon"></n-icon>
          </o-if>
          <o-else-if :value="$data.fromPlayground" slot="prefix">
            <n-icon icon="ci:code" class="icon"></n-icon>
          </o-else-if>
          <o-else slot="prefix">
            <n-icon icon="ix:project" class="icon"></n-icon>
          </o-else>
          {{$data.name}}
          <o-if :value="$data.isLocal" slot="suffix">
            <p-button
              icon
              size="small"
              variant="text"
              on:click="$host.unmountLocalProject($data,$event)"
              title="Unmount"
              attr:disabled="$host.creating"
              style="margin-left: 8px; z-index: 3"
            >
              <n-icon icon="material-symbols:link-off"></n-icon>
            </p-button>
          </o-if>
          <o-if :value="$data.fromPlayground && !$data.isLocal" slot="suffix">
            <p-button
              icon
              size="small"
              variant="text"
              on:click="$host.restoreCode($data,$event)"
              title="Restore Code"
              attr:disabled="$host.creating"
              style="margin-left: 8px; z-index: 3"
            >
              <n-icon icon="ic:round-restore"></n-icon>
            </p-button>
          </o-if>
          <o-if :value="!$data.isLocal" slot="suffix">
            <p-button
              icon
              size="small"
              variant="text"
              on:click="$host.deleteProject($data,$event)"
              color="error"
              attr:disabled="$host.creating || $host.projectPath === $data.path"
              style="margin-left: 8px; z-index: 3"
            >
              <n-icon icon="material-symbols:delete-outline"></n-icon>
            </p-button>
          </o-if>
        </p-list-item>
      </o-fill>
    </p-list>
  </div>

  <o-consumer
    name="o-code"
    watch:project-handle-path="projectPath"
  ></o-consumer>
  <script>
    export default async ({ load, url }) => {
      const { get } = await load("/nos/fs/main.js");
      const { open, unmount } = await load("/nos/fs/handle/mount/mount.js");
      const { confirm } = await load("/gh/ofajs/Punch-UI/packages/util.js");
      const { resetProjectFile } = await load(
        "../../../../code/util/reset-project-file.js",
      );

      const { getLocaleText } = await load(
        "/nos/locale-text/get-locale-text.js",
      );

      const resolve = (path) => {
        const urlObj = new URL(path, url);
        return urlObj.href;
      };

      return {
        data: {
          list: [],
          projectPath: "",
          newProjectName: "",
          creating: false,
          tempIndex: 0,
          temps: [
            {
              name: await getLocaleText({
                cn: "静态页面案例",
                en: "Static Page Template",
              }),
              path: "../template/static",
            },
            {
              name: await getLocaleText({
                cn: "ofa.js页面模块案例",
                en: "ofa.js Page Module Template",
              }),
              path: "../template/page-case",
            },
            {
              name: await getLocaleText({
                cn: "ofa.js应用案例",
                en: "ofa.js App Template",
              }),
              path: "../template/app-case",
            },
          ],
          canMount: !!window.showDirectoryPicker,
        },
        proto: {
          async mountLocalDir() {
            try {
              const handle = await open({
                mount: true,
              });

              let localProject = localStorage.getItem("localPlaygroundProject");
              if (!localProject) {
                localProject = [];
              } else {
                localProject = JSON.parse(localProject);
              }

              const exists = localProject.some((p) => p.path === handle.path);
              if (!exists) {
                localProject.push({
                  path: handle.path,
                  name: handle.name,
                  isLocal: true,
                });
              }

              localStorage.setItem(
                "localPlaygroundProject",
                JSON.stringify(localProject),
              );

              await this.loadProject();
            } catch (error) {
              console.error("Failed to mount local directory:", error);
            }
          },
          async unmountLocalProject(item, event) {
            event.stopPropagation();
            event.preventDefault();

            const result = await confirm({
              title: await getLocaleText({
                cn: "移除本地目录",
                en: "Remove Local Directory",
              }),
              message: await getLocaleText({
                cn: `确定要移除本地目录 "${item.name}" 吗？文件不会被删除。`,
                en: `Are you sure you want to remove local directory "${item.name}"? Files will not be deleted.`,
              }),
            });

            if (!result) {
              return;
            }

            try {
              await unmount(item.path);

              let localProject = localStorage.getItem("localPlaygroundProject");
              if (localProject) {
                localProject = JSON.parse(localProject);
                localProject = localProject.filter((p) => p.path !== item.path);
                localStorage.setItem(
                  "localPlaygroundProject",
                  JSON.stringify(localProject),
                );
              }

              await this.loadProject();
            } catch (error) {
              console.error("Failed to unmount local directory:", error);
            }
          },
          async createProject() {
            this.creating = true;

            const newProjectHandle = await get(
              `code-projects/project-${Date.now()}`,
              {
                create: "dir",
              },
            );

            const tempData = this.temps[this.tempIndex];

            const fileJson = await fetch(
              resolve(tempData.path + "/_files.json"),
            ).then((e) => e.json());

            for (let path of fileJson.files) {
              const content = await fetch(
                resolve(tempData.path + "/" + path),
              ).then((e) => e.text());

              const handle = await newProjectHandle.get(path, {
                create: "file",
              });

              await handle.write(content);
            }

            const pkgHandle = await newProjectHandle.get("package.json", {
              create: "file",
            });

            await pkgHandle.write(
              JSON.stringify(
                {
                  name: this.newProjectName,
                },
                null,
                2,
              ),
            );

            this.selectOpt({
              path: newProjectHandle.path,
            });
          },
          async deleteProject(item, event) {
            event.stopPropagation();
            event.preventDefault();

            const result = await confirm({
              title: await getLocaleText({
                cn: "删除项目",
                en: "Delete Project",
              }),
              message: await getLocaleText({
                cn: `确定要删除项目 "${item.name}" 吗？此操作无法撤销。`,
                en: `Are you sure you want to delete project "${item.name}"? This action cannot be undone.`,
              }),
            });

            if (!result) {
              return;
            }

            const projectHash = item.path.split("/").pop();

            try {
              const projectHandle = await get(`code-projects/${projectHash}`);
              if (projectHandle) {
                await projectHandle.remove();
              }

              const originHandle = await get(
                `code-origins/${projectHash}.json`,
              );
              if (originHandle) {
                await originHandle.remove();
              }

              await this.loadProject();
            } catch (error) {
              console.error(
                await getLocaleText({
                  cn: "删除项目失败:",
                  en: "Failed to delete project:",
                }),
                error,
              );
            }
          },
          async restoreCode(item, event) {
            event.stopPropagation();
            event.preventDefault();

            const result = await confirm({
              title: await getLocaleText({
                cn: "还原代码",
                en: "Restore Code",
              }),
              message: await getLocaleText({
                cn: "确定要还原这个项目的代码吗？代码将被覆盖，此操作无法撤销。",
                en: "Are you sure you want to restore the code for this project? The code will be overwritten and this action cannot be undone.",
              }),
            });

            if (!result) {
              return;
            }

            const projectHash = item.path.split("/").pop();
            const originHandle = await get(`code-origins/${projectHash}.json`);
            const originData = await originHandle.text();

            await resetProjectFile(originData);

            location.reload();
          },
          selectOpt(item) {
            this.emit("project-selected", {
              data: {
                path: item.path,
              },
            });

            const projectHash = item.isLocal
              ? item.path
              : item.path.split("/").pop();
            const isInCode = location.pathname.includes("/code/");
            const targetPath = isInCode
              ? location.pathname
              : location.pathname
                  .replace(/\/index\.html$/, "")
                  .replace(/\/$/, "") + "/code/index.html";
            location.href = `${location.origin}${targetPath}?h=${encodeURIComponent(projectHash)}`;
          },
          async loadProject() {
            const handle = await get("code-projects");

            const list = [];

            if (handle && handle.kind === "dir") {
              for await (let item of handle.values()) {
                try {
                  const pkgHandle = await item.get("package.json");

                  let name = null;

                  if (pkgHandle) {
                    const data = await pkgHandle.json();
                    name = data.name;
                  }

                  const projectHash = item.path.split("/").pop();

                  const originHandle = await get(
                    `code-origins/${projectHash}.json`,
                  );

                  if (!name && originHandle) {
                    const data = await originHandle.json();
                    if (data.name) {
                      name = data.name;
                    } else if (data.time) {
                      name = `case-${new Date(data.time).toLocaleString()}`;
                    }
                  }

                  if (!name) {
                    name = item.name;
                  }

                  list.push({
                    path: item.path,
                    name,
                    fromPlayground: originHandle ? true : false,
                  });
                } catch (error) {
                  console.log(error);
                }
              }
            }

            const localProject = localStorage.getItem("localPlaygroundProject");
            if (localProject) {
              try {
                const localList = JSON.parse(localProject);
                for (const item of localList) {
                  list.push({
                    path: item.path,
                    name: item.name,
                    isLocal: true,
                  });
                }
              } catch (error) {
                console.error("Failed to load local projects:", error);
              }
            }

            this.list = list;
          },
          async updateTitle() {
            await new Promise((resolve) => setTimeout(resolve, 100));
            const item = this.shadow.$("p-list-item[active-item]");

            if (item) {
              $("title").text = item.text.trim();
              this.emit("update-title", {
                data: {
                  title: item.text.trim(),
                },
                composed: true,
              });
            }
          },
        },
        async attached() {
          await this.loadProject();
          this.updateTitle();
        },
      };
    };
  </script>
</template>
