<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/dialog/dialog.html"></l-m>
  <style>
    :host {
      display: block;
    }

    .container {
      padding: 0 1px;
      max-width: 60vw;
      min-width: 40vw;
      cursor: default;
    }

    .link-container {
      background: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline, #ccc);
      border-radius: 6px;
      padding: 8px 12px;
      max-width: 60vw;
      margin: 0 0 16px;
      font-size: 12px;
      color: var(--md-sys-color-on-surface);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
  <p-dialog :open="open" on:click-mask="open = false">
    <div slot="title">分享代码</div>
    <div class="container">
      <p>你可以直接复制以下链接分享给他人</p>
      <div class="link-container">{{ shareLink }}</div>
      <p-button
        variant="outlined"
        size="small"
        on:click="clickCopy"
        attr:disabled="copied"
        attr:color="copied ? 'success' : 'primary'"
      >
        <x-if :value="!copied"> 复制链接 </x-if>
        <x-else>
          <n-icon slot="prefix" icon="ix:success"></n-icon>
          已复制
        </x-else>
      </p-button>
    </div>
  </p-dialog>
  <o-consumer
    name="o-code"
    watch:project-handle-path="projectPath"
  ></o-consumer>
  <script>
    export default async ({ load }) => {
      const { compress } = await load("../../util.js");
      const { get } = await load("/nos/fs/main.js");
      const { toast } = await load("/gh/ofajs/Punch-UI/packages/util.js");

      return {
        data: {
          shareLink: "",
          projectPath: "",
          open: null,
          tooLarge: false,
          compressedSize: 0,
          copied: false,
        },
        watch: {
          open(open) {
            if (open) {
              this.loadCode();
            }
          },
        },
        proto: {
          async clickCopy() {
            await navigator.clipboard.writeText(this.shareLink);
            this.copied = true;
            setTimeout(() => {
              this.copied = false;
            }, 1000);
          },
          async loadCode() {
            // 获取项目文件
            const projectHandle = await get(this.projectPath);

            const files = [];
            for await (let handle of projectHandle.values()) {
              if (handle.name === "node_modules") {
                continue;
              }

              if (handle.kind === "file") {
                const content = await handle.text();

                files.push({
                  p: handle.path.replace(this.projectPath + "/", ""),
                  c: content,
                });
              }
            }

            const data = {
              files,
              active: files[0].p,
            };

            const compressedStr = await compress(JSON.stringify(data));

            let origin = "https://playground.ofajs.com";

            if (location.origin.includes("localhost")) {
              origin = location.origin;
            }

            // 大于 8kb，提醒可能会分享失败
            if (compressedStr.length > 8192 - 100) {
              // toast("项目代码大小超过 8kb，可能会分享失败");
              this.tooLarge = true;
              this.compressedSize = compressedStr.length;
            }

            this.shareLink = `${origin}/?redirect=w&d=${compressedStr}`;
          },
        },
        attached() {},
      };
    };
  </script>
</template>
