<template page>
  <style>
    :host {
      display: block;
      padding: 0 1px;
      max-width: 60vw;
      min-width: 40vw;
      cursor: default;
    }
    .link-container {
      background: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline, #ccc);
      border-radius: 6px;
      padding: 8px 12px;
      max-width: 60vw;
      margin: 0 0 16px;
      font-size: 12px;
      color: var(--md-sys-color-on-surface);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    p {
      margin: 8px 0;
    }
  </style>
  <p>你可以直接复制以下链接分享给他人</p>
  <div class="link-container">{{ shareLink }}</div>
  <p-button variant="outlined" size="small" on:click="clickCopy">
    复制链接
  </p-button>
  <o-if :value="tooLarge">
    <div style="color: var(--md-sys-color-error)">
      <p>
        项目代码大小为 {{ compressedSize }} 字节，已超过 8 KB，分享可能失败。
      </p>
      <p>
        项目数据并非存储在云端，而是通过 URL
        传递。受浏览器地址长度限制，内容过长可能导致分享失败。
      </p>
      <p>
        如需反馈 Bug，建议先将示例精简至 8
        KB以下；或直接下载项目压缩包并分享文件。
      </p>
    </div>
  </o-if>
  <o-consumer
    name="o-code"
    watch:project-handle-path="projectPath"
  ></o-consumer>
  <script>
    export default async ({ load }) => {
      const { compress } = await load("../../util.js");
      const { get } = await load("/nos/fs/main.js");
      const { toast } = await load("/gh/ofajs/Punch-UI/packages/util.js");

      return {
        data: {
          shareLink: "",
          projectPath: "",
          open: null,
          tooLarge: false,
          compressedSize: 0,
        },
        watch: {
          open(open) {
            if (open) {
              this.loadCode();
            }
          },
        },
        proto: {
          async clickCopy() {
            await navigator.clipboard.writeText(this.shareLink);
            toast("复制成功");
          },
          async loadCode() {
            // 获取项目文件
            const projectHandle = await get(this.projectPath);

            const files = [];
            for await (let handle of projectHandle.values()) {
              if (handle.name === "node_modules") {
                continue;
              }

              if (handle.kind === "file") {
                const content = await handle.text();

                files.push({
                  p: handle.path.replace(this.projectPath + "/", ""),
                  c: content,
                });
              }
            }

            const data = {
              files,
              active: files[0].p,
            };

            const compressedStr = await compress(JSON.stringify(data));

            let origin = "https://playground.ofajs.com";

            if (location.origin.includes("localhost")) {
              origin = location.origin;
            }

            // 大于 8kb，提醒可能会分享失败
            // if (compressedStr.length > 8192 - 100) {
            // toast("项目代码大小超过 8kb，可能会分享失败");
            this.tooLarge = true;
            this.compressedSize = compressedStr.length;
            // }

            this.shareLink = `${origin}/?redirect=w&d=${compressedStr}`;
          },
        },
        attached() {},
      };
    };
  </script>
</template>
