<template page>
  <l-m src="/gh/ofajs/Punch-UI/packages/wave/wave.html"></l-m>
  <style>
    :host {
      display: flex;
      width: 100%;
      height: 40px;
      align-items: center;
      cursor: pointer;
    }
    .logo {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 40px;
      padding: 0 20px 0 12px;
      margin: 4px 0 0 4px;
      border-radius: 16px;
    }
    .logo-text {
      font-size: 14px;
      font-weight: bold;
    }
    .logo img {
      height: 24px;
    }
    .logo-text-wrapper {
      margin-left: 6px;
      line-height: 0.76em;
    }
    .logo-sub-text {
      font-size: 10px;
      color: var(--md-sys-color-normal);
    }
    p-button {
      margin-left: 8px;
    }
  </style>
  <div class="logo" on:click="openSwitchDialog = true">
    <p-wave></p-wave>
    <img src="./logo.svg" alt="logo" />
    <div class="logo-text-wrapper">
      <div class="logo-text">OFA Playground</div>
      <span class="logo-sub-text">切换项目</span>
    </div>
  </div>
  <p-button
    icon
    variant="text"
    size="small"
    on:click="clickSidebarBtn"
    style="margin-left: 64px"
  >
    <n-icon icon="boxicons:sidebar"></n-icon>
  </p-button>
  <p-button variant="text" on:click="clickPreviewBtn" size="small">
    <n-icon icon="material-symbols:preview" slot="prefix"></n-icon>
    预览
  </p-button>

  <p-button size="small" on:click="clickRestoreBtn" variant="text">
    <n-icon icon="ic:baseline-restore" slot="prefix"></n-icon>
    还原项目代码
  </p-button>

  <div style="flex: 1"></div>

  <p-button variant="outlined" size="small" on:click="clickDownloadBtn">
    <n-icon icon="mdi:download" slot="prefix"></n-icon>
    下载项目
  </p-button>

  <p-button
    size="small"
    on:click="openShareDialog = true"
    style="margin-right: 16px"
  >
    <n-icon icon="ic:twotone-share" slot="prefix"></n-icon>
    发布
  </p-button>

  <o-consumer
    name="o-code"
    watch:project-handle-path="projectPath"
  ></o-consumer>

  <o-page
    src="./share-panel.html"
    sync:open="openShareDialog"
    style="position: absolute"
  ></o-page>

  <o-page
    src="./switch-project.html"
    sync:open="openSwitchDialog"
    style="position: absolute"
  ></o-page>

  <script>
    export default async ({ load }) => {
      const { download } = await load("/nos/fs/download.js");
      const { get } = await load("/nos/fs/main.js");
      const { confirm } = await load("/gh/ofajs/Punch-UI/packages/util.js");
      const { resetProjectFile } = await load(
        "../../../../code/util/reset-project-file.js",
      );

      return {
        data: {
          projectPath: null,
          openShareDialog: false,
          openSwitchDialog: false,
        },
        proto: {
          async clickRestoreBtn() {
            const result = await confirm({
              title: "还原代码",
              message:
                "确定要还原整个项目的代码吗？当前项目的代码将被覆盖，此操作无法撤销。",
            });

            if (!result) {
              return;
            }

            const params = new URLSearchParams(location.search);
            const hash = params.get("h");

            // 读取对应hash的项目源文件
            const originHandle = await get(`code-origins/${hash}.json`);
            const originData = await originHandle.text();

            await resetProjectFile(originData);

            location.reload();
          },
          clickPreviewBtn() {
            const provider = this.getProvider("o-code");
            provider.emit("click-preview-btn");
            provider.dispatch("click-preview-btn");
          },
          clickSidebarBtn() {
            const provider = this.getProvider("o-code");
            provider.emit("click-sidebar-btn");
          },
          async clickDownloadBtn() {
            const handle = await get(this.projectPath);
            download(handle);
          },
        },
      };
    };
  </script>
</template>
