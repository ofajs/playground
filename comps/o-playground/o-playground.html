<template component>
  <style>
    :host {
      display: block;
    }
  </style>
  <div class="container"></div>
  <script>
    export default async ({ load, url }) => {
      const { isUseSamplePlayground } = await load("./public.js");
      const useSample = await isUseSamplePlayground();
      const componentSrc = useSample
        ? "./sample-playground.html"
        : "./standard-playground.html";

      load(componentSrc);

      return {
        tag: "o-playground",
        attrs: {
          name: null,
        },
        data: {},
        async attached() {
          const targetTag = useSample
            ? "o-sample-playground"
            : "o-standard-playground";

          this.shadow.$(".container").html =
            `<${targetTag}>${this.html}</${targetTag}>`;
        },
      };
    };
  </script>
</template>
