<template component>
  <style>
    :host {
      display: block;
    }
  </style>
  <div class="container"></div>
  <script>
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

    export default async ({ load, url }) => {
      // safari 无法满足 iframe内嵌套的 none-core运行，所以被迫使用 sample 版本
      let componentSrc = "./standard-playground.html";

      (async () => {
        if (isSafari) {
          // 尝试请求本地api是否可用
          const config = await fetch("/__config")
            .then((res) => res.json())
            .catch(() => null);

          if (!config) {
            componentSrc = "./sample-playground.html";
          }
        }

        load(componentSrc);
      })();

      return {
        tag: "o-playground",
        attrs: {
          name: null,
        },
        data: {},
        async attached() {
          const targetTag = isSafari
            ? "o-sample-playground"
            : "o-standard-playground";

          this.shadow.$(".container").html =
            `<${targetTag}>${this.html}</${targetTag}>`;
        },
      };
    };
  </script>
</template>
