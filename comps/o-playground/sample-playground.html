<template component>
  <style>
    :host {
      position: relative;
      display: block;
      border-radius: 8px;
      border: 1px solid var(--md-sys-color-primary);
      overflow: hidden;
      text-align: left;
    }

    .top-bar {
      display: flex;
      align-items: center;
      height: 32px;
      padding: 0 8px;
      color: var(--md-sys-color-on-primary);
      background-color: var(--md-sys-color-primary);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      flex: 1;
      height: 100%;
      user-select: none;
    }

    .tab {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 0 8px;
      font-size: 12px;
      cursor: pointer;
      color: inherit;
      margin-right: 2px;
    }

    .tab:hover {
      color: var(--md-sys-color-primary-container);
      background-color: var(--md-sys-color-on-primary-container);
    }

    .tab.active {
      color: var(--md-sys-color-primary-container);
      background-color: var(--md-sys-color-on-primary-container);
    }

    .tab.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 2px;
      background-color: var(--md-sys-color-primary-container);
    }

    .tab.hide {
      display: none;
    }

    .content {
      position: relative;
      display: flex;
      height: 100%;
    }

    .code-container {
      flex: 1;
      overflow: auto;
      background-color: var(--md-sys-color-surface);
      border-right: 1px solid var(--md-sys-color-primary);
    }

    .code-block {
      margin: 0;
      font-family: "Courier New", Courier, monospace;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre;
      color: var(--md-sys-color-on-surface);
      background: transparent;
    }

    .code-block code {
      font-family: inherit;
      font-size: inherit;
      line-height: inherit;
      background: transparent;
    }

    .preview-container {
      flex: 0 0 300px;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      padding: 16px;
      align-items: center;
      justify-content: center;
      background-color: var(--md-sys-color-surface-variant);
      border-left: 1px solid var(--md-sys-color-outline);
    }

    .open-btn {
      padding: 12px 24px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .open-btn:hover {
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
    }

    .open-btn:active {
      transform: scale(0.98);
    }

    #code-display {
      min-height: 100px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--md-sys-color-surface, #f3f3f3);
      border-top: 2px solid var(--md-sys-color-primary, #3498db);
      border-radius: 50%;
      animation: spin 0.5s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .mask {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--md-sys-color-surface);
      z-index: 3;
    }

    .hide {
      display: none;
    }
  </style>

  <link rel="stylesheet" href="./hljs.css" />

  <div class="mask" class:hide="isReady">
    <div class="spinner"></div>
  </div>

  <div class="top-bar">
    <div class="tabs">
      <o-fill :value="fileItems">
        <div
          class="tab"
          on:click="$host.handleTabClick($data)"
          class:active="$host.activeFilePath === $data.path"
          class:hide="$host.hideUnimportantFiles && $data.unimportant"
        >
          {{$data.path}}
        </div>
      </o-fill>
    </div>
  </div>

  <div class="content">
    <div class="code-container">
      <pre class="code-block"><code id="code-display" class="hljs"></code></pre>
    </div>
    <div class="preview-container">
      <p>
        由于 Safari 浏览器的安全限制，无法在此直接预览页面。
        请点击下方按钮，在新标签页中查看效果。
      </p>
      <button class="open-btn" on:click="handleOpenClick">
        在 Playground 中打开
      </button>
    </div>
  </div>

  <o-consumer name="pui" watch:theme="theme"></o-consumer>

  <script>
    import hljs from "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/+esm";
    import {
      prefixContent,
      getFileContent,
      handleOpenClick,
      getLanguageFromPath,
      formatCode,
    } from "./public.js";

    let linkAppended = false;

    export default async ({ load, url }) => {
      const linkUrlObj = new URL("./hljs.css", url);

      const localPrefix = location.origin;
      const remotePrefix = "https://core.noneos.com";

      const iconExists = await fetch(`${localPrefix}/nos/n-icon/n-icon.html`, {
        method: "HEAD",
      })
        .then((r) => r.ok)
        .catch(() => false);

      const prefix = iconExists ? localPrefix : remotePrefix;

      const [, { getHash }] = await Promise.all([
        load(`${prefix}/nos/n-icon/n-icon.html`),
        load(`${prefix}/nos/util/hash/get-hash.js`),
      ]);

      const { compress, decompress } = await load("../util.js");

      return {
        tag: "o-sample-playground",
        attrs: { already: "" },
        data: {
          theme: "",
          fileItems: [],
          activeFilePath: null,
          isReady: false,
          showConfig: false,
          hideUnimportantFiles: true,
        },
        proto: {
          async handleOpenClick() {
            await handleOpenClick(
              this.fileItems,
              this.activeFilePath,
              compress,
              this.attr("name"),
            );
          },
          handleTabClick(tab) {
            if (tab.path === this.activeFilePath) {
              return;
            }

            this.activeFilePath = tab.path;
            this.updateActiveFileContent();
          },
          updateActiveFileContent() {
            const activeFile = this.fileItems.find(
              (item) => item.path === this.activeFilePath,
            );
            if (activeFile) {
              const language = getLanguageFromPath(activeFile.path);
              formatCode(activeFile.content, language).then((formattedCode) => {
                try {
                  const highlightedCode = hljs.highlight(formattedCode, {
                    language: language,
                    ignoreIllegals: true,
                  }).value;

                  const codeDisplay = this.shadow.$("#code-display");
                  if (codeDisplay) {
                    codeDisplay.html = highlightedCode;
                  }
                } catch (error) {
                  console.warn("Code highlighting failed:", error);
                  const codeDisplay = this.shadow.$("#code-display");
                  if (codeDisplay) {
                    codeDisplay.text = formattedCode;
                  }
                }
              });
            }
          },
          async getFileContent() {
            return await getFileContent(this.all("code"), getHash);
          },
          async initPreview() {
            const data = await this.getFileContent();

            if (data.files.length === 1) {
              data.files[0].defaultActive = true;

              if (data.files[0].isPage) {
                const indexFile = {
                  path: "index.html",
                  content: `${prefixContent}\n<o-page src="./${data.files[0].path}"></o-page>`,
                  unimportant: true,
                  isComponent: false,
                  isPage: false,
                  preview: false,
                };

                data.files.push(indexFile);
              }
            }

            this.fileItems = data.files;

            let activeFileData = data.files.find((item) => item.defaultActive);

            if (!activeFileData) {
              activeFileData = data.files[0];
            }

            this.activeFilePath = activeFileData.path;
            this.updateActiveFileContent();
            this.isReady = true;
          },
        },
        async ready() {},
        async attached() {
          await this.initPreview();

          if (!linkAppended) {
            $("head").push(
              `<link rel="stylesheet" href="${linkUrlObj.href}" />`,
            );
            linkAppended = true;
          }
        },
        detached() {},
      };
    };
  </script>
</template>
