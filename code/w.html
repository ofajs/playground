<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writing...</title>
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    Waiting...
    <script type="module">
      import { decompress } from "../comps/util.js";
      import { getHash } from "/nos/util/hash/get-hash.js";
      import { get, init } from "/nos/fs/main.js";
      import { resetProjectFile } from "./util/reset-project-file.js";

      (async () => {
        const params = new URLSearchParams(location.search);
        const compressedData = params.get("d");
        if (!compressedData) {
          return;
        }
        const projectJson = await decompress(compressedData);
        const project = JSON.parse(projectJson);
        const projectHash = await getHash(JSON.stringify(project.files));

        await init("code-origins");
        const originFile = await get(`code-origins/${projectHash}.json`, {
          create: "file",
        });

        // 添加时间
        project.time = Date.now();

        // 写入文件
        await originFile.write(JSON.stringify(project));

        await resetProjectFile(projectJson);

        location.href = `./?h=${projectHash}`;
      })();
    </script>
  </body>
</html>
