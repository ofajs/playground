<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writing...</title>
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    Waiting...
    <script type="module">
      import { decompress } from "../comps/util.js";
      import { getHash } from "https://core.noneos.com/nos/util/hash/get-hash.js";
      import { get, init } from "https://core.noneos.com/nos/fs/main.js";
      import jsBeautify from "https://cdn.jsdelivr.net/npm/js-beautify@1.15.1/+esm";

      (async () => {
        const params = new URLSearchParams(location.search);
        const compressedStr = params.get("d");
        if (!compressedStr) {
          return;
        }

        const decompressedStr = await decompress(compressedStr);

        // 计算hash值
        const hash = await getHash(decompressedStr);

        // 写入到项目文件
        await init("code-projects");
        await init("code-origins");

        const projectDirHandle = await get("code-projects/" + hash, {
          create: "dir",
        });

        // 写入原始文件
        const originFileHandle = await get(`code-origins/${hash}.json`, {
          create: "file",
        });

        await originFileHandle.write(decompressedStr);

        // 先清空项目文件
        for await (const handle of projectDirHandle.values()) {
          await handle.remove();
        }

        // 写入项目文件
        const data = JSON.parse(decompressedStr);
        for (let { p: path, c: content } of data) {
          const handle = await projectDirHandle.get(path, {
            create: "file",
          });

          // 判断是html文件，则格式化html
          if (path.endsWith(".html")) {
            // 判断如果是不完整的html内容，则补充模板内容
            if (
              !content.startsWith("<template ") &&
              !content.includes(`<!doctype`)
            ) {
              content = `<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>${path.split("/").pop().replace(".html", "")}</title>
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
      }
    </style>
  </head>
  <body>
    ${content}
  </body>
</html>
`;
            }

            content = jsBeautify.html(content, {
              indent_size: 2,
              indent_char: " ",
              eol: "\n",
              preserve_newlines: false,
            });
          } else if (path.endsWith(".js") || path.endsWith(".mjs")) {
            content = jsBeautify.js(content, {
              indent_size: 2,
              indent_char: " ",
              eol: "\n",
            });
          } else if (path.endsWith(".css") || path.endsWith(".scss")) {
            content = jsBeautify.css(content, {
              indent_size: 2,
              indent_char: " ",
              eol: "\n",
            });
          }

          await handle.write(content);
        }

        location.href = `./?h=${hash}`;
      })();
    </script>
  </body>
</html>
