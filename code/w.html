<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Writing...</title>
    <link rel="stylesheet" href="./theme.css" />
  </head>
  <body>
    Waiting...
    <script type="module">
      import { decompress } from "../comps/util.js";
      import { getHash } from "https://core.noneos.com/nos/util/hash/get-hash.js";
      import { get, init } from "https://core.noneos.com/nos/fs/main.js";
      import { resetProjectFile } from "./util/reset-project-file.js";

      (async () => {
        const params = new URLSearchParams(location.search);
        const compressedData = params.get("d");
        if (!compressedData) {
          return;
        }

        const filesJson = await decompress(compressedData);
        const projectHash = await getHash(filesJson);

        await init("code-origins");
        const originFile = await get(`code-origins/${projectHash}.json`, {
          create: "file",
        });
        await originFile.write(filesJson);

        await resetProjectFile(filesJson);

        location.href = `./?h=${projectHash}`;
      })();
    </script>
  </body>
</html>
